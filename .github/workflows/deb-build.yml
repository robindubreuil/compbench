name: Build and Test

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev debhelper build-essential fakeroot btrfs-progs xz-utils gdisk curl

      - name: Build
        run: make

      - name: Run Tests
        run: sudo bash test.sh

      - name: Build Debian Package
        run: |
          dpkg-buildpackage -us -uc
          mv ../compbench_*.deb ./

      - name: Upload Debian Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compbench-deb
          path: compbench_*.deb
